# docker-compose.yml
version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db
    networks:
      - skill-network

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://root:password@mongo:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_MONGODB_SERVER: mongo
    networks:
      - skill-network
    depends_on:
      - mongo

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: skill-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://root:password@mongo:27017/skillcollection?authSource=admin
      - PORT=8080
      - NODE_ENV=development
      - JWT_SECRET=your-secret-key-change-in-production
    networks:
      - skill-network
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skill-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:8080/api

    networks:
      - skill-network
    depends_on:
      - backend

volumes:
  mongo-data:

networks:
  skill-network:
    driver: bridge
